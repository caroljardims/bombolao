name: Sync placares

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar secrets
        env:
          WORLDCUP_API_KEY: ${{ secrets.WORLDCUP_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$WORLDCUP_API_KEY" ]; then
            echo "::error::Configure o secret WORLDCUP_API_KEY (worldcupapi.com)"
            exit 1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Configure o secret FIREBASE_SERVICE_ACCOUNT_JSON (JSON da service account Firebase)"
            exit 1
          fi

      - name: Configurar credenciais Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Sincronizar placares
        env:
          WORLDCUP_API_KEY: ${{ secrets.WORLDCUP_API_KEY }}
          BOLAO_IDS: colorados-do-inter
        run: npm run sync-scores -- --all
