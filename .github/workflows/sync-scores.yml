name: Sync placares

on:
  schedule:
    # A cada 10 min na janela de jogos (15h–05h UTC ≈ 12h–02h BRT), junho/julho.
    # O gate abaixo dispensa o sync quando não há jogo ao vivo/próximo.
    - cron: '*/10 0-5,15-23 * 6,7 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      should_sync: ${{ steps.check.outputs.should_sync }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar se há jogo na janela
        id: check
        run: node scripts/should-sync-scores.mjs

  sync:
    needs: gate
    # Roda quando o gate detecta jogo na janela, ou sempre que disparado manualmente.
    if: ${{ needs.gate.outputs.should_sync == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar secrets
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Configure o secret FIREBASE_SERVICE_ACCOUNT_JSON (JSON da service account Firebase)"
            exit 1
          fi

      - name: Configurar credenciais Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Sincronizar placares (todos os bolões)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: npm run sync-scores -- --all
